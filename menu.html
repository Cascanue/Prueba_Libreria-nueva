<!DOCTYPE html>
<html lang="es">
    //Hola casca
<head>
    <meta charset="UTF-8">
    <title>Book Center - Menú Principal</title>
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .contenedor-menu {
            max-width: 800px;
            margin: 3rem auto;
            text-align: center;
        }
        .grid-modulos {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        .modulo-card {
            background: var(--blanco);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: var(--sombra);
            width: 220px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--azul-oscuro);
        }
        .modulo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 2px solid var(--azul-primario);
        }
        .icono-modulo { font-size: 3rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <header class="encabezado">
    <div class="zona-izquierda">
        <a href="#" id="btnCerrarSesion" class="btn-salir">Cerrar Sesión</a>
    </div>
    
    <img src="https://res.cloudinary.com/dwk77ddoq/image/upload/v1781397979/imagen_2026-06-13_194618193_hkz2d2.png" alt="Logo Book Center" class="logo-header">
    
    <div class="zona-derecha">
        <a href="#" class="btn-salir oculto" id="btnAdmin">Administración</a>
    </div>
</header>

    <div class="contenedor-menu">
        <h1 id="saludoUsuario" style="font-size: 2.5rem; margin-bottom: 1rem;">¡Bienvenido!</h1>
        <p style="color: var(--gris); font-size: 1.2rem;">Seleccione el módulo con el que desea trabajar hoy.</p>

        <div class="grid-modulos">
            <a href="registrar-cliente.html" class="modulo-card" id="modCliente">
                <i class='bx bx-user icono-modulo'></i>
                <h3>Registrar Cliente</h3>
            </a>

            <a href="registrar-pedido.html" class="modulo-card oculto" id="modPedido">
                <i class='bx bx-basket icono-modulo'></i>
                <h3>Registrar Pedido</h3>
            </a>

            <a href="procesar-pago.html" class="modulo-card oculto" id="modPago">
                <i class='bx bx-wallet icono-modulo'></i>
                <h3>Procesar Pago</h3>
            </a>
        </div>
    </div>

    <script>
        // Lógica de Protección y Roles
        const rolActual = localStorage.getItem('rolUsuario');
        
        // Si alguien intenta entrar sin loguearse, lo pateamos al index
        if (!rolActual) window.location.href = 'index.html';

        // Lógica de visualización según el rol
        if (rolActual === 'vendedor') {
            document.getElementById('modPedido').classList.remove('oculto');
            // Cliente ya es visible por defecto
        } 
        else if (rolActual === 'cajero') {
            document.getElementById('modPago').classList.remove('oculto');
            // Cliente ya es visible por defecto
        } 
        else if (rolActual === 'administrador') {
            document.getElementById('modPedido').classList.remove('oculto');
            document.getElementById('modPago').classList.remove('oculto');
            document.getElementById('btnAdmin').classList.remove('oculto');
        }
        // Inyectar el nombre dinámicamente
        const nombreActual = localStorage.getItem('nombreUsuario');
            if (nombreActual) {
                document.getElementById('saludoUsuario').innerText = `¡Bienvenido, ${nombreActual}!`;
            }

        // Lógica para cerrar sesión correctamente
            document.getElementById('btnCerrarSesion').addEventListener('click', (e) => {
            e.preventDefault(); // Evitamos que el <a> nos lleve a "#"
            localStorage.clear(); // ¡Destruimos la sesión!
            window.location.href = 'index.html'; // Redirigimos
        });
    </script>
</body>
</html>
