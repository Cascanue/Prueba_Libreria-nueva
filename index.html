<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Book Center - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .pantalla-login {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-contenedor {
            max-width: 400px;
            text-align: center;
            overflow: hidden;
            transition: all 0.5s ease;
        }
        .barra-inferior {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 30px;
            background-color: var(--azul-primario);
        }
        .link-recuperar {
            color: var(--azul-primario);
            font-size: 0.9rem;
            text-decoration: none;
            margin-top: 1rem;
            display: inline-block;
        }
        .link-recuperar:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="pantalla-login">
        <div class="tarjeta login-contenedor" id="cajaLogin">
            <h2 style="margin-bottom: 1rem; color: var(--azul-primario); font-size: 2rem;">¡Bienvenido!</h2>
            <img src="https://res.cloudinary.com/dwk77ddoq/image/upload/v1781397979/imagen_2026-06-13_194618193_hkz2d2.png" alt="Logo Book Center" style="max-width: 80%; height: auto; margin: 0 auto 2rem auto; display: block;">
            
            

            <form id="formularioLogin" style="text-align: left; margin-top: 1rem;">
                <div class="input-grupo">
                    <label>Usuario</label>
                    <input type="text" id="usuario" class="input-moderno" placeholder="Ingrese su nombre de usuario" required>
                </div>
                
                <div class="input-grupo">
                    <label>Contraseña</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="password" id="password" class="input-moderno" placeholder="••••••••" required>
                        <button type="button" id="btnOjito" style="padding: 0 10px; cursor: pointer; border-radius: 8px; border: 1px solid #ccc;">👁️</button>
                    </div>
                </div>

                <button type="submit" class="btn-principal">Ingresar</button>
                <div style="text-align: center;">
                    <a href="#" class="link-recuperar" id="linkRecuperar">¿Olvidaste tu contraseña?</a>
                </div>
            </form>
        </div>
    </div>
    <div class="barra-inferior"></div>

    <script src="js/config.js"></script>

    <script>
        
        // Lógica del ojito
        const inputPass = document.getElementById('password');
        document.getElementById('btnOjito').addEventListener('click', () => {
            if (inputPass.type === 'password') {
                inputPass.type = 'text';
            } else {
                inputPass.type = 'password';
            }
        });

        // Lógica de Login Real

document.getElementById('formularioLogin').addEventListener('submit', async (e) => {
    e.preventDefault();
    const usuario = document.getElementById('usuario').value;
    const password = document.getElementById('password').value;
    
    try {
        const respuesta = await fetch(`${URL_BACKEND}/api/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: usuario, password: password })
        });
        
        const resultado = await respuesta.json();
        
        if (resultado.exito) {
            
            localStorage.setItem('rolUsuario', resultado.usuario.nombre_rol.toLowerCase());
            localStorage.setItem('idUsuario', resultado.usuario.id_usuario);
            localStorage.setItem('nombreUsuario', resultado.usuario.nombre_completo); 
            window.location.href = 'menu.html';
        } else {
            alert("❌ " + resultado.mensaje); // Muestra error si pone mal la clave
        }
    } catch (error) {
        alert("❌ Error de conexión con el servidor.");
    }
});
    </script>
</body>
</html>
